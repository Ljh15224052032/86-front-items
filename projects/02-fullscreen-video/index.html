<!DOCTYPE html>
<!--
    项目02：全屏视频背景（Fullscreen Video Background）
    技术栈：HTML5 + CSS3
    功能：使用HTML5 Video标签创建全屏视频背景效果
-->
<html lang="zh-CN">

<head>
    <!-- 字符编码：UTF-8 -->
    <meta charset="UTF-8">

    <!-- 视口设置：响应式布局 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 页面标题 -->
    <title>项目02：Fullscreen Video Background | HTML5 Video</title>

    <!-- 引入外部样式表 -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- 视频+内容容器 -->
    <div class="banner">
        <!-- 视频背景 -->
        <video autoplay muted loop playsinline>
            <source src="assets/issue-2/water-stone.mp4" type="video/mp4">
        </video>

        <!-- 内容层 -->
        <div class="content">
            <h1>Fullscreen Video Background</h1>
            <p>This is a simple example of a fullscreen video background using HTML5 video.</p>
        </div>
    </div>

    <!-- 底部推荐网站 -->
    <footer>
        <h3>🎬 免费视频素材网站</h3>
        <p>
            <a href="https://www.pexels.com/videos/" target="_blank">Pexels</a> |
            <a href="https://pixabay.com/videos/" target="_blank">Pixabay</a> |
            <a href="https://coverr.co/" target="_blank">Coverr</a>
        </p>
    </footer>
</body>

</html>
