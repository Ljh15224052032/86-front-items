<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form - 登录表单</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 页面标题 -->
    <div class="title">
        <h1>Sign In Form</h1>
    </div>

    <!-- 登录表单容器 -->
    <div class="container">
        <!-- 左侧：图片区域 -->
        <div class="left"></div>

        <!-- 右侧：表单区域 -->
        <div class="right">
            <div class="formBox">
                <form>
                    <p>Username</p>
                    <input type="text" name="username" placeholder="Online">
                    <p>Password</p>
                    <input type="password" name="password" placeholder="••••••">
                    <input type="submit" name="submit" value="Sign In">
                    <a href="#">Forget Password</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
