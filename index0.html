<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前端86个项目练习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, "Times New Roman", "Songti SC", serif;
            background: #faf8f5;
            color: #2c3e50;
            min-height: 100vh;
            padding: 20px;
            border-top: 4px solid #8b4513;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #d4c5b0;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #2c3e50;
            letter-spacing: 0.05em;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #5a4a3a;
            font-style: italic;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 8px 16px;
            border: 1px solid #d4c5b0;
            background: #fff;
        }

        .stat-number {
            font-size: 1.2rem;
            font-weight: bold;
            color: #8b4513;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #5a4a3a;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        .project-card {
            background: #fff;
            border: 1px solid #d4c5b0;
            padding: 12px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: all 0.2s;
        }

        .project-card:hover {
            border-color: #8b4513;
            background: #faf8f5;
        }

        .project-number {
            display: inline-block;
            background: #2f4f4f;
            color: #fff;
            padding: 2px 8px;
            font-size: 0.55rem;
            font-weight: bold;
            margin-bottom: 6px;
            align-self: flex-start;
            letter-spacing: 0.05em;
        }

        .project-title {
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: #2c3e50;
            line-height: 1.4;
            font-weight: bold;
        }

        .project-tech {
            color: #5a4a3a;
            font-size: 0.7rem;
            margin-bottom: 6px;
            line-height: 1.3;
            font-style: italic;
        }

        .project-status {
            display: inline-block;
            padding: 3px 8px;
            font-size: 0.65rem;
            align-self: flex-start;
            border: 1px solid;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-done {
            background: #2f4f4f;
            color: #fff;
            border-color: #2f4f4f;
        }

        .status-progress {
            background: #fff;
            color: #8b4513;
            border-color: #8b4513;
        }

        .status-todo {
            background: #fff;
            color: #999;
            border-color: #d4c5b0;
        }

        /* 查阅按钮样式 */
        .project-card {
            position: relative;
        }

        .view-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: #8b4513;
            color: #fff;
            border: none;
            padding: 4px 10px;
            font-size: 0.6rem;
            cursor: pointer;
            text-decoration: none;
            border-radius: 3px;
            transition: all 0.2s;
            font-family: Georgia, "Times New Roman", serif;
            letter-spacing: 0.05em;
        }

        .view-btn:hover {
            background: #6b3410;
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            color: #5a4a3a;
            margin-top: 30px;
            font-size: 0.85rem;
            padding-top: 20px;
            border-top: 1px solid #d4c5b0;
        }

        /* 响应式布局优化 */
        @media (min-width: 1400px) {
            .projects-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }

        @media (min-width: 1200px) and (max-width: 1399px) {
            .projects-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
        }

        @media (min-width: 992px) and (max-width: 1199px) {
            .projects-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
        }

        @media (min-width: 768px) and (max-width: 991px) {
            .projects-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 576px) and (max-width: 767px) {
            .projects-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 575px) {
            .projects-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.8rem;
            }

            .stats {
                gap: 15px;
            }

            .stat-item {
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>前端86个项目练习</h1>
            <p class="subtitle">系统化的前端交互效果练习项目集</p>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number">86</div>
                    <div class="stat-label">总项目数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">0</div>
                    <div class="stat-label">已完成</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">0%</div>
                    <div class="stat-label">完成率</div>
                </div>
            </div>
        </header>

        <main class="projects-grid">
            <!-- 项目卡片示例 -->
            <a href="projects/01-parallax-scrolling/" class="project-card">
                <span class="project-number">01</span>
                <h2 class="project-title">视差滚动效果</h2>
                <p class="project-tech">CSS3, JavaScript, 视差滚动</p>
                <span class="project-status status-done">已完成</span>
            </a>

            <a href="projects/02-fullscreen-video/" class="project-card">
                <span class="project-number">02</span>
                <h2 class="project-title">全屏视频背景</h2>
                <p class="project-tech">HTML5 Video, CSS3</p>
                <span class="project-status status-todo">待完成</span>
            </a>

            <!-- 更多项目卡片... -->
        </main>

        <footer>
            <p>使用 GitHub Pages 托管 | 持续更新中...</p>
        </footer>
    </div>

    <script>
        // 动态更新统计信息（需要根据实际情况调整）
        function updateStats() {
            const total = 86;
            const cards = document.querySelectorAll('.project-card');
            let completed = 0;

            cards.forEach(card => {
                const status = card.querySelector('.project-status');
                if (status.classList.contains('status-done')) {
                    completed++;

                    // 为已完成的卡片添加查阅按钮
                    if (!card.querySelector('.view-btn')) {
                        const viewBtn = document.createElement('button');
                        viewBtn.className = 'view-btn';
                        viewBtn.textContent = '点击查阅';

                        // 阻止按钮点击事件冒泡，避免重复跳转
                        viewBtn.addEventListener('click', function(e) {
                            e.preventDefault();
                            e.stopPropagation();
                            window.location.href = card.getAttribute('href');
                        });

                        card.appendChild(viewBtn);
                    }
                }
            });

            const percentage = Math.round((completed / total) * 100);

            document.querySelectorAll('.stat-number')[1].textContent = completed;
            document.querySelectorAll('.stat-number')[2].textContent = percentage + '%';
        }

        // 页面加载时更新统计
        updateStats();
    </script>
</body>
</html>
